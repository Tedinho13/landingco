<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Co</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="main__menu-mobile" aria-label="Menu mobilne">
        <div class="burger__icon">
            <span class="burger__bar burger__bar--1"></span><span class="burger__bar burger__bar--2"></span><span class="burger__bar burger__bar--3"></span>
        </div>
        <div class="menu__logo-box"><img src="img/travelCo logo.png" alt="logo firmy TravelCo" class="menu__logo"></div>
            <svg class="search__icon" viewBox="0 0 24 24">
                <use href="img/search-icon-1.svg"></use>
            </svg>
    </nav>
    <nav class="main__menu-desktop" aria-label="Menu desktopowe">
       <div class="menu__logo-box"><img src="img/travelCo logo.png" alt="logo firmy TravelCo" class="menu__logo"></div>
       <ul class="menu__list">
        <li class="menu__item"><a href="#" class="menu__link">Destinations</a></li>
        <li class="menu__item"><a href="#" class="menu__link">Experiences</a></li>
        <li class="menu__item"><a href="#" class="menu__link">Packages</a></li>
        <li class="menu__item"><a href="#" class="menu__link">Sustainability</a></li>
        <li class="menu__item"><a href="#" class="menu__link">About</a></li>
       </ul>
        
        <div class="menu__buttons">
            <button class="btn btn-sign">Sign in</button>
            <button class="btn btn-join btn--blue">Join now</button>
        </div>
    </nav>
    <header class="hero">
        <div class="hero__content">
        <h1 class="heading__primary">Twoja wielka przygoda zaczyna się tutaj!</h1>
        <button class="btn btn--yellow">Przeglądaj oferty</button>
        </div>
    </header>
</body>
</html>
